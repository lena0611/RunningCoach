name: Bug
description: Track a confirmed defect, regression, or broken workflow.
title: "[Bug] "
labels:
  - type:bug
body:
  - type: markdown
    attributes:
      value: |
        Track confirmed defects here. After the issue is accepted, work should happen in an issue-specific git worktree on an `issue-<number>/<short-slug>` branch. Keep comments as real Markdown with actual newlines, not literal `\n` text.
        The GitHub Project field `업무 피로도` is maintained separately by the active workstream window as `fresh`, `normal`, `tired`, or `reset-needed`.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken and how does it affect the user or operation?
    validations:
      required: true
  - type: dropdown
    id: workstream
    attributes:
      label: Workstream
      options:
        - 01-harness-ops
        - 02-product-planning
        - 03-ui-ux
        - 04-running-logic
        - 05-ai-coaching
        - 06-healthkit-ios
        - 07-data-supabase
        - 08-injury-domain
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: input
    id: completion-owner
    attributes:
      label: Completion Owner
      placeholder: "03-ui-ux"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: checkboxes
    id: verification
    attributes:
      label: Verification
      options:
        - label: none
        - label: unit
        - label: e2e
        - label: build
        - label: harness-check
        - label: manual
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, affected files, browser/device, or related decisions.
