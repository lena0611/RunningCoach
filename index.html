<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f3f6f4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0f14" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="PACELAB" />
    <link rel="icon" type="image/svg+xml" href="/pacelab-icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      #app {
        min-height: 100vh;
        min-height: 100dvh;
      }

      .pacelab-boot {
        box-sizing: border-box;
        display: grid;
        min-height: 100vh;
        min-height: 100dvh;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
        color: #f8fafc;
        background:
          radial-gradient(circle at 74% 14%, rgba(208, 255, 54, 0.12), transparent 26%),
          radial-gradient(circle at 14% 94%, rgba(99, 102, 241, 0.1), transparent 24%),
          linear-gradient(180deg, #070b12 0%, #0b0f14 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .pacelab-boot__content {
        display: grid;
        justify-items: center;
        gap: 22px;
        text-align: center;
      }

      .pacelab-boot__mark {
        display: grid;
        width: 86px;
        height: 86px;
        place-items: center;
        border: 1px solid rgba(208, 255, 54, 0.3);
        border-radius: 24px;
        background: rgba(208, 255, 54, 0.08);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.36);
      }

      .pacelab-boot__brand {
        font-size: 34px;
        font-style: italic;
        font-weight: 900;
        letter-spacing: 0;
      }

      .pacelab-boot__brand span {
        color: #d6ff35;
      }

      .pacelab-boot__tagline {
        margin: -10px 0 0;
        color: #94a3b8;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.32em;
      }
    </style>
    <script>
      ;(() => {
        try {
          const raw = localStorage.getItem('runcontext.settings')
          const saved = raw ? JSON.parse(raw) : {}
          const preference = ['system', 'light', 'dark'].includes(saved.themePreference) ? saved.themePreference : 'system'
          const systemTheme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          const theme = preference === 'system' ? systemTheme : preference
          document.documentElement.classList.add(`theme-${theme}`)
          document.documentElement.dataset.themePreference = preference
          document.documentElement.dataset.theme = theme
        } catch {
          document.documentElement.classList.add('theme-dark')
        }
      })()
    </script>
    <title>PACELAB</title>
  </head>
  <body>
    <div id="app">
      <div class="pacelab-boot" aria-label="PACELAB 로딩 중">
        <div class="pacelab-boot__content">
          <div class="pacelab-boot__mark">
            <svg width="54" height="54" viewBox="0 0 64 64" aria-hidden="true">
              <path d="M21 17c3-5 10-6 16-3" fill="none" stroke="#d6ff35" stroke-width="4" stroke-linecap="round" />
              <path d="M36 14h8" fill="none" stroke="#d6ff35" stroke-width="4" stroke-linecap="round" />
              <circle cx="31" cy="20" r="5" fill="#d6ff35" />
              <path d="M32 28l-5 9 9 4" fill="none" stroke="#d6ff35" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M29 34l-9 1" fill="none" stroke="#d6ff35" stroke-width="4" stroke-linecap="round" />
              <path d="M36 41l-5 10" fill="none" stroke="#d6ff35" stroke-width="5" stroke-linecap="round" />
              <path d="M37 41l11 4" fill="none" stroke="#d6ff35" stroke-width="5" stroke-linecap="round" />
              <path d="M32 29l10 2" fill="none" stroke="#d6ff35" stroke-width="4" stroke-linecap="round" />
              <path d="M42 31l6-6" fill="none" stroke="#d6ff35" stroke-width="4" stroke-linecap="round" />
            </svg>
          </div>
          <div>
            <div class="pacelab-boot__brand">PACE<span>LAB</span></div>
            <p class="pacelab-boot__tagline">AI POWERED TRAINING LAB</p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
